<div class="mobile-add-booking">
  <div class="form-header">
    <button class="back-btn" (click)="cancel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2>New Booking</h2>
  </div>

  <div class="form-body">
    <!-- Aadhaar -->
    <div class="form-section">
      <label class="form-label">Aadhaar Number <span class="req">*</span></label>
      <input class="form-input" type="tel" maxlength="12" placeholder="Enter 12 digit Aadhaar"
             [(ngModel)]="aadharNumber" (ngModelChange)="onAadharChange()">
      @if (checkingAadhar) {
        <span class="hint">Looking up...</span>
      }
      @if (existingTenant) {
        <span class="hint success">Tenant found: {{ existingTenant.name }}</span>
      }
      @if (hasActiveBooking) {
        <span class="hint error">Tenant already has an active booking</span>
      }
    </div>

    <!-- Tenant Name -->
    <div class="form-section">
      <label class="form-label">Tenant Name <span class="req">*</span></label>
      <input class="form-input" type="text" placeholder="Enter tenant name"
             [(ngModel)]="name" [disabled]="!!existingTenant">
    </div>

    <!-- Contact -->
    <div class="form-section">
      <label class="form-label">Contact Number <span class="req">*</span></label>
      <input class="form-input" type="tel" maxlength="10" placeholder="10 digit mobile"
             [(ngModel)]="contactNumber" [disabled]="!!existingTenant">
    </div>

    <!-- Room -->
    <div class="form-section">
      <label class="form-label">Room <span class="req">*</span></label>
      <select class="form-input" [(ngModel)]="roomId">
        <option value="">Select room</option>
        @for (room of rooms; track room.roomId) {
          <option [value]="room.roomId">Room {{ room.roomNumber }}</option>
        }
      </select>
    </div>

    <!-- Scheduled Check-in Date -->
    <div class="form-section">
      <label class="form-label">Scheduled Check-in Date <span class="req">*</span></label>
      <input class="form-input" type="date" [(ngModel)]="scheduledCheckInDate">
    </div>

    <!-- Advance Toggle -->
    <div class="form-section">
      <label class="toggle-row">
        <span class="form-label" style="margin-bottom: 0">Collect Advance</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="hasAdvance">
          <span class="slider"></span>
        </label>
      </label>
    </div>

    @if (hasAdvance) {
      <!-- Advance Amount -->
      <div class="form-section">
        <label class="form-label">Advance Amount <span class="req">*</span></label>
        <input class="form-input" type="number" placeholder="Enter amount"
               [(ngModel)]="advanceAmount">
      </div>

      <!-- Payment Mode -->
      <div class="form-section">
        <label class="form-label">Payment Mode <span class="req">*</span></label>
        <div class="mode-chips">
          @for (mode of paymentModes; track mode.code) {
            <button class="mode-chip" [class.selected]="paymentModeCode === mode.code"
                    (click)="paymentModeCode = mode.code" type="button">
              {{ mode.description }}
            </button>
          }
        </div>
      </div>
    }

    <!-- Notes -->
    <div class="form-section">
      <label class="form-label">Notes</label>
      <textarea class="form-input" rows="3" placeholder="Optional notes"
                [(ngModel)]="notes"></textarea>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button class="btn-cancel" (click)="cancel()" type="button">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="saving || hasActiveBooking" type="button">
        @if (saving) { Saving... } @else { Save Booking }
      </button>
    </div>
  </div>
</div>
