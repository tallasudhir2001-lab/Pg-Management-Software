<div class="pgu-page">
  <div class="pgu-header">
    <h1 class="pgu-title">Manage Users</h1>
    <button class="btn-add" (click)="showAddForm = !showAddForm">
      {{ showAddForm ? 'Cancel' : '+ Add User' }}
    </button>
  </div>

  <!-- Add User Form -->
  <div *ngIf="showAddForm" class="pgu-add-form">
    <h3 class="form-title">Add User to PG</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="newUser.name" placeholder="John Doe" class="form-input" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="newUser.email" placeholder="john@example.com" class="form-input" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="newUser.password" placeholder="Temporary password" class="form-input" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select [(ngModel)]="newUser.roleName" class="form-input">
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" (click)="addUser()" [disabled]="saving || !newUser.email || !newUser.name || !newUser.password">
        {{ saving ? 'Adding...' : 'Add User' }}
      </button>
    </div>
  </div>

  <!-- Users Table -->
  <div *ngIf="loading" class="pgu-state">Loading users...</div>

  <div *ngIf="!loading" class="pgu-table-wrap">
    <table class="pgu-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td class="pgu-name">{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <ng-container *ngIf="editingRoleUserId === user.userId; else roleBadge">
              <div class="role-edit-row">
                <select [(ngModel)]="editingRole" class="role-select">
                  <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
                </select>
                <button class="btn-sm btn-confirm" (click)="saveRole(user)">Save</button>
                <button class="btn-sm btn-discard" (click)="cancelEditRole()">Cancel</button>
              </div>
            </ng-container>
            <ng-template #roleBadge>
              <span class="role-badge" [ngClass]="roleBadgeClass(user.role)">{{ user.role }}</span>
            </ng-template>
          </td>
          <td class="pgu-actions">
            <button class="btn-sm btn-edit" (click)="startEditRole(user)" *ngIf="editingRoleUserId !== user.userId">
              Change Role
            </button>
            <button class="btn-sm btn-remove" (click)="confirmRemove(user.userId)">Remove</button>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="4" class="pgu-empty">No users in this PG yet. Add one above.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Remove Confirm -->
<ng-container *ngIf="pendingRemoveUserId">
  <div class="modal-backdrop" (click)="pendingRemoveUserId = null"></div>
  <div class="confirm-modal">
    <div class="confirm-modal-header">
      <h3>Remove User</h3>
      <button class="modal-close-btn" (click)="pendingRemoveUserId = null">✕</button>
    </div>
    <div class="confirm-modal-body">
      <p>Are you sure you want to remove this user from the PG? They will lose access immediately.</p>
    </div>
    <div class="confirm-modal-actions">
      <button class="btn-discard" (click)="pendingRemoveUserId = null">Cancel</button>
      <button class="btn-danger" (click)="removeUser()">Remove</button>
    </div>
  </div>
</ng-container>
