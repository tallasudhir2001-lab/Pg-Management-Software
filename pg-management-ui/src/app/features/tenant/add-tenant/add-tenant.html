<div class="form-page-container">
  <div class="add-tenant-card">

    <!--  Reactive Form -->
    <form [formGroup]="form">

      <div class="form-grid">

        <!-- LEFT SECTION -->
        <div class="form-section section-left">
          <h3 class="section-subtitle">Tenant Details</h3>

          <div class="form-group">
            <label>Aadhaar Number</label>
            <input type="text" maxlength="12" inputmode="numeric" pattern="[0-9]*" class="form-input"
              placeholder="Enter Aadhaar number" formControlName="aadharNumber" />
          </div>
          <div *ngIf="existingTenant" class="existing-tenant-warning">

            <p>
              Tenant <span class="existing-tenant-name">{{ existingTenant.name }}</span> already exists.
            </p>

            <div class="existing-tenant-actions">

              <button type="button" class="btn-secondary" (click)="viewExistingTenant()">
                View Tenant
              </button>

              <button type="button" class="btn-primary" (click)="createStayForExisting()">
                Create Stay
              </button>

            </div>

          </div>


          <div class="form-group">
            <label>Tenant Name</label>
            <input type="text" class="form-input" placeholder="Enter tenant name" formControlName="name" />
          </div>

          <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" class="form-input" placeholder="Enter mobile number" formControlName="contactNumber" />
          </div>


        </div>

        <!-- RIGHT SECTION -->
        <div class="form-section section-right">
          <h3 class="section-subtitle">Room Details</h3>

          <div class="form-group">
            <label>Room</label>
            <select class="form-input" formControlName="roomId">

              <option value="">Select room</option>

              <option *ngFor="let room of rooms$ | async" [value]="room.roomId">
                Room {{ room.roomNumber }} - available beds -> ({{ room.vacancies }})
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>Checked In Date</label>
            <input type="date" class="form-input" formControlName="fromDate" />
          </div>
        </div>

        <!-- BOTTOM SECTION -->
        <div class="form-section section-bottom">
          <h3 class="section-subtitle">Financial Details</h3>

          <div class="financial-row">
            <div class="form-group">
              <!-- Has Advance Checkbox -->
              <div class="form-group">
                <div class="form-group checkbox-group">
                  <label class="checkbox-label">
                    <input type="checkbox" formControlName="hasAdvance" />
                    <span>Add Advance</span>
                  </label>
                </div>
              </div>
          
              <!-- Show only if checked -->
              <div *ngIf="form.get('hasAdvance')?.value">
          
                <div class="form-group">
                  <label>Advance Amount (₹)</label>
                  <input type="number" class="form-input" placeholder="Enter amount" formControlName="advanceAmount" />
                </div>
          
                <div class="form-group">
                  <label>Payment Mode</label>
                  <select class="form-input" formControlName="paymentModeCode"
                    [class.placeholder-selected]="!form.get('paymentModeCode')?.value">
                
                    <option value="" disabled hidden>Select a payment mode</option>
                
                    <option *ngFor="let m of (paymentModes$ | async)" [value]="m.code">
                      {{ m.description }}
                    </option>
                
                  </select>
                </div>
          
              </div>
            </div>

          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea rows="3" class="form-input" placeholder="Additional notes (optional)" formControlName="notes">
            </textarea>
          </div>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <button type="button" class="btn-cancel" (click)="cancel()">
          Cancel
        </button>

        <button *ngIf="!existingTenant" type="button" class="btn-save" (click)="save()"
          [disabled]="form.invalid || checkingAadhar">
          Save Tenant
        </button>
      </div>

    </form>
  </div>
</div>
