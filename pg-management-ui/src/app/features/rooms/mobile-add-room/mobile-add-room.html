<div class="mobile-add-room">
  <button class="back-btn" (click)="cancel()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </button>

  <h2 class="page-title">Add New Room</h2>

  <div class="form-card">
    <div class="form-group">
      <label class="form-label">Room Number <span class="required">*</span></label>
      <input type="text" class="form-input" placeholder="e.g. 101" [(ngModel)]="model.roomNumber">
    </div>

    <div class="form-group">
      <label class="form-label">Capacity (Beds)</label>
      <input type="number" class="form-input" placeholder="Enter capacity" min="1" [(ngModel)]="model.capacity">
    </div>

    <div class="form-group">
      <label class="form-label">Monthly Rent (₹)</label>
      <input type="number" class="form-input" placeholder="Enter amount" min="0" [(ngModel)]="model.rentAmount">
    </div>

    <label class="checkbox-label">
      <input type="checkbox" [(ngModel)]="model.isAc">
      <span>AC Room</span>
    </label>

    <div class="actions">
      <button class="btn-cancel" (click)="cancel()">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save Room' }}
      </button>
    </div>
  </div>
</div>
