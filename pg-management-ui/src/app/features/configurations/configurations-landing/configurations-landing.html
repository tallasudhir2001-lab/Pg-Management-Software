<div class="landing-page">
  <h2 class="page-title">Settings</h2>
  <p class="page-subtitle">Manage users, notification preferences and other settings for your PG.</p>

  <div class="card-grid">
    <a *ngFor="let card of options" [routerLink]="card.route" class="report-card">
      <span class="card-icon">{{ card.icon }}</span>
      <div class="card-body">
        <div class="card-title">{{ card.title }}</div>
        <div class="card-desc">{{ card.description }}</div>
      </div>
      <svg class="card-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
    </a>
  </div>

  <!-- About Section -->
  <div class="about-section" *ngIf="appVersion">
    <h3 class="about-title">ℹ️ About</h3>
    <div class="about-grid">
      <div class="about-item">
        <span class="about-label">Version</span>
        <span class="about-value">v{{ appVersion.version }}</span>
      </div>
      <div class="about-item">
        <span class="about-label">Build Date</span>
        <span class="about-value">{{ appVersion.buildDate }}</span>
      </div>
    </div>
  </div>
</div>
